<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Keeper App</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>

    <div id="root" style="text-align: center;"></div>
   
    <script type="text/babel">

        let score = 0;
        let wicket = 0;
        let ballWiseResult = [];

        // function oneClick(){
        //     alert("1 is clicked")
        // }

        function addOne(){
            if(wicket<10){
            score += 1;
            // console.log(score);
            rootElement.render(<App />);
            }
        }

        function addTwo(){
            if(wicket<10){
            score += 2;
            // console.log(score);
            rootElement.render(<App />);
            }
        }

        function addScore(num){
            if(wicket<10){
                ballWiseResult.push(num)
                score += num;
                rootElement.render(<App/>);
                console.log(ballWiseResult);
            }
        }

        function addWicket(){
            if(wicket<10){
                ballWiseResult.push("W");
                wicket +=1;
                rootElement.render(<App/>);
                console.log(ballWiseResult);
            }
        }

        const ScoreButtons = () =>(
            <div>
                {/*<button onClick={addOne}>1</button>*/}
                {/*<button onClick={addTwo}>2</button>*/}
                <button onClick={()=>addScore(0)}>0</button>
                <button onClick={()=>addScore(1)}>1</button>
                <button onClick={()=>addScore(2)}>2</button>
                <button onClick={()=>addScore(3)}>3</button>
                <button onClick={()=>addScore(4)}>4</button>
                <button onClick={()=>addScore(5)}>5</button>
                <button onClick={()=>addScore(6)}>6</button>
                <button onClick={addWicket}>Wicket</button>
            </div>
        )

        const BallWiseResult = () => (
            <div>
                {ballWiseResult.map((res, index) => (
                    <React.Fragment key={index}>
                    {index%6 === 0?<br/>:null}
                    {/*<span key={index}>{res === 0 ? <strong>.</strong>: res}</span>&nbsp;&nbsp;&nbsp;*/}
                    <span>{
                        res === 0 ? <strong>.</strong>: (
                            res === "W" ? 
                            <span style = {{color : "#f00"}}>{res}</span>:
                            <span style = {{color : "#00ff"}}>{res}</span>
                            )
                        }
                    </span>&nbsp;&nbsp;&nbsp;
                    </React.Fragment>
                ))}
            </div>
        )
        
        const App = () => (
            <>
            <h1>Score Keeper</h1>
            <h2>Score: {score}/{wicket}</h2>
            <ScoreButtons/>
            <BallWiseResult/>
            </>
        )

        const rootElement = ReactDOM.createRoot(document.getElementById("root"));
        rootElement.render(<App />);

    </script>
    
</body>
</html>
